<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pharmacy Manager Pro - إدارة صيدليتي</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c7da0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="style.css">
    <!-- Libraries via CDN (will be cached by service worker) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/quagga@0.12.1/dist/quagga.min.js"></script>
</head>
<body>
    <div id="appSection">
        <div class="header">
            <button id="notifBtn" class="notif-btn">🔔<span id="notifBadge" class="notif-badge" style="display:none;">0</span></button>
            <div class="title" id="appTitle" onclick="goHome()">
                <span class="app-icon">💊</span> إدارة صيدليتي
            </div>
            <div style="display: flex; gap: 8px;">
                <button id="saveBtn" class="save-header-btn" title="حفظ يدوي">💾</button>
                <button id="settingsHeaderBtn" class="settings-header-btn">⚙️</button>
                <button id="backBtn" class="back-btn" style="display: none;">←</button>
            </div>
        </div>
        <div id="pageContent"></div>
    </div>

    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="spinner"></div>
        <div class="loading-text">جاري التحميل...</div>
    </div>

    <!-- Medicine Details Modal -->
    <div id="medModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('medModal')">✖</span>
            <h3>تفاصيل الدواء</h3>
            <div id="medDetail"></div>
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="save-btn" onclick="editCurrentMed()">تعديل</button>
                <button class="save-btn" style="background: var(--danger);" onclick="deleteCurrentMed()">حذف</button>
            </div>
        </div>
    </div>

    <!-- Add/Edit Medicine Modal -->
    <div id="medFormModal" class="modal">
        <div class="modal-content" style="max-width: 550px;">
            <span class="close-modal" onclick="closeMedFormModal()">✖</span>
            <h3 id="medFormTitle">إضافة دواء</h3>
            <div class="med-form">
                <div class="form-row">
                    <input type="text" id="medName" placeholder="الاسم التجاري *" class="form-input">
                    <input type="text" id="scientificName" placeholder="الاسم العلمي" class="form-input">
                </div>
                <div class="form-row">
                    <input type="text" id="company" placeholder="الشركة" class="form-input">
                    <input type="text" id="origin" placeholder="المنشأ" class="form-input">
                </div>
                <div class="form-row">
                    <select id="medType" class="form-input"><option value="pharmacy">صيدلية</option></select>
                    <select id="medCategory" class="form-input">
                        <option value="">اختر التصنيف</option>
                        <option>مضادات حيوية</option><option>مسكنات وخافضات حرارة</option>
                        <option>أدوية الضغط والقلب</option><option>فيتامينات ومكملات</option>
                        <option>أدوية الجهاز الهضمي</option><option>أدوية الجهاز التنفسي</option>
                        <option>أدوية السكري</option><option>أدوية موضعية</option><option>أخرى</option>
                    </select>
                </div>
                <div class="form-row">
                    <input type="date" id="medExpiry" placeholder="تاريخ الانتهاء *" class="form-input">
                </div>
                <div class="form-row">
                    <input type="text" id="medBarcode" placeholder="الباركود (اختياري)" class="form-input">
                    <button type="button" class="small-btn" id="scanBarcodeBtn">📷 مسح باركود</button>
                </div>
                <div class="form-row image-upload">
                    <label class="image-upload-label"><span>📷 اختر صورة</span><input type="file" id="medImage" accept="image/*" style="display: none;"></label>
                    <div id="imagePreview" class="image-preview"></div>
                </div>
                <div class="form-actions">
                    <button id="submitMedBtn" class="save-btn">حفظ الدواء</button>
                    <button class="cancel-btn" onclick="closeMedFormModal()">إلغاء</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Barcode Scanner Modal -->
    <div id="barcodeScannerModal" class="modal">
        <div class="modal-content" style="max-width: 90%;">
            <span class="close-modal" onclick="stopScannerAndClose()">✖</span>
            <h3>مسح الباركود</h3>
            <div id="scannerContainer" style="width:100%; position:relative;">
                <video id="scannerVideo" autoplay playsinline style="width:100%; border-radius:16px;"></video>
                <canvas id="scannerCanvas" style="display:none;"></canvas>
            </div>
            <div id="scannerResult" style="margin-top:12px; text-align:center;"></div>
            <button class="save-btn" onclick="stopScannerAndClose()">إلغاء</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('settingsModal')">✖</span>
            <h3>⚙️ الإعدادات</h3>
            <div class="settings-container" style="padding: 0; margin-top: 16px;">
                <div class="settings-section">
                    <div class="settings-section-title">اللغة</div>
                    <div class="settings-option">
                        <label>اللغة</label>
                        <select id="langSelect" class="lang-select">
                            <option value="ar">العربية</option>
                            <option value="en">English</option>
                        </select>
                        <button class="small-btn" id="applyLangBtn">تطبيق</button>
                    </div>
                </div>
                <div class="settings-section">
                    <div class="settings-section-title">الوضع المظلم</div>
                    <div class="settings-option">
                        <label>الوضع المظلم</label>
                        <button class="small-btn" id="darkModeToggleBtn">تشغيل</button>
                    </div>
                </div>
                <div class="settings-section">
                    <div class="settings-section-title">النسخ الاحتياطي والاستعادة</div>
                    <div class="import-export-buttons">
                        <button class="small-btn" id="exportDbBtn">تصدير JSON</button>
                        <label class="small-btn" id="importDbLabel" style="background: var(--primary); display: inline-block; cursor: pointer;">
                            استيراد JSON
                            <input type="file" id="importFileInput" accept=".json" style="display: none;">
                        </label>
                    </div>
                </div>
                <div class="settings-section">
                    <div class="settings-section-title">تصدير CSV / PDF</div>
                    <div class="import-export-buttons">
                        <button class="small-btn" id="exportCsvBtn">CSV</button>
                        <button class="small-btn" id="exportPdfBtn">PDF</button>
                    </div>
                </div>
                <div class="settings-section">
                    <div class="settings-section-title">حول التطبيق</div>
                    <div class="settings-option" style="justify-content: center;">
                        <button class="small-btn" id="aboutBtn">عرض المعلومات</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then(reg => console.log('Service Worker registered'))
                .catch(err => console.error('Service Worker registration failed', err));
        }
    </script>
</body>
</html>
